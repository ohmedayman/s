<body class="bg-dark-950 text-white font-tajawal">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext, useCallback } = React;

        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyD3IT_cpG8umAO41FLeOSCOzt4whyndWUI",
            authDomain: "socialmedia-byvexonet.firebaseapp.com",
            projectId: "socialmedia-byvexonet",
            storageBucket: "socialmedia-byvexonet.firebasestorage.app",
            messagingSenderId: "811962367877",
            appId: "1:811962367877:web:380f89a7559485a3ca8eec",
            measurementId: "G-WN4FZ1HHM7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        const analytics = firebase.analytics();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // ==================== CONTEXTS ====================
        const AuthContext = createContext();
        const ToastContext = createContext();
        const ThemeContext = createContext();

        function useAuth() { return useContext(AuthContext); }
        function useToast() { return useContext(ToastContext); }
        function useTheme() { return useContext(ThemeContext); }

        // ==================== TOAST PROVIDER ====================
        function ToastProvider({ children }) {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };
            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed top-4 left-4 z-[100] space-y-2">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`toast px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 ${toast.type === 'success' ? 'bg-emerald-500' : toast.type === 'error' ? 'bg-red-500' : 'bg-brand-500'}`}>
                                <span>{toast.type === 'success' ? '✓' : toast.type === 'error' ? '✕' : 'ℹ'}</span>
                                <span className="text-white text-sm font-medium">{toast.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        }

        // ==================== THEME PROVIDER ====================
        function ThemeProvider({ children }) {
            const [darkMode, setDarkMode] = useState(true);
            useEffect(() => { document.documentElement.classList.toggle('dark', darkMode); }, [darkMode]);
            return <ThemeContext.Provider value={{ darkMode, setDarkMode }}>{children}</ThemeContext.Provider>;
        }

        // ==================== AUTH PROVIDER ====================
        function AuthProvider({ children }) {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [userData, setUserData] = useState(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (user) => {
                    setUser(user);
                    if (user) {
                        const doc = await db.collection('users').doc(user.uid).get();
                        if (doc.exists) setUserData(doc.data());
                        else {
                            const newUserData = { name: user.displayName || 'مستخدم', email: user.email, plan: 'free', createdAt: new Date().toISOString() };
                            await db.collection('users').doc(user.uid).set(newUserData);
                            setUserData(newUserData);
                        }
                    } else { setUserData(null); }
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            const loginWithEmail = (email, password) => auth.signInWithEmailAndPassword(email, password);
            const registerWithEmail = async (email, password, name) => {
                const res = await auth.createUserWithEmailAndPassword(email, password);
                await res.user.updateProfile({ displayName: name });
                await db.collection('users').doc(res.user.uid).set({ name, email, plan: 'free', createdAt: new Date().toISOString() });
                return res;
            };
            const loginWithGoogle = async () => {
                const res = await auth.signInWithPopup(googleProvider);
                const doc = await db.collection('users').doc(res.user.uid).get();
                if (!doc.exists) await db.collection('users').doc(res.user.uid).set({ name: res.user.displayName, email: res.user.email, plan: 'free', createdAt: new Date().toISOString() });
                return res;
            };
            const logout = () => auth.signOut();
            const resetPassword = (email) => auth.sendPasswordResetEmail(email);
            const updateProfile = async (data) => { await db.collection('users').doc(user.uid).update(data); setUserData(prev => ({ ...prev, ...data })); };

            const value = { user, userData, loading, loginWithEmail, registerWithEmail, loginWithGoogle, logout, resetPassword, updateProfile };
            return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
        }

        // ==================== HELPER COMPONENTS ====================
        function LoadingSpinner() {
            return <div className="flex items-center justify-center py-20"><div className="spinner"></div></div>;
        }

        function Modal({ isOpen, onClose, title, children }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 modal-overlay" onClick={onClose}>
                    <div className="glass-card rounded-2xl w-full max-w-md mx-4 modal-content" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between p-5 border-b border-dark-700">
                            <h3 className="text-lg font-bold text-white">{title}</h3>
                            <button onClick={onClose} className="w-8 h-8 rounded-full bg-dark-700 hover:bg-dark-600 flex items-center justify-center text-dark-300 transition-colors">✕</button>
                        </div>
                        <div className="p-5">{children}</div>
                    </div>
                </div>
            );
        }

        function ConfirmDialog({ isOpen, onClose, onConfirm, title, message }) {
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={title}>
                    <p className="text-dark-300 mb-6">{message}</p>
                    <div className="flex gap-3">
                        <button onClick={onClose} className="flex-1 px-4 py-3 bg-dark-700 hover:bg-dark-600 rounded-xl text-white transition-colors">إلغاء</button>
                        <button onClick={onConfirm} className="flex-1 px-4 py-3 bg-red-500 hover:bg-red-600 rounded-xl text-white transition-colors">تأكيد الحذف</button>
                    </div>
                </Modal>
            );
        }

        // ==================== LANDING PAGE ====================
        function Navbar({ onNavigate }) {
            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'bg-dark-950/90 backdrop-blur-xl border-b border-dark-800' : ''}`}>
                    <div className="max-w-7xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">

                        </div>
                        <div className="hidden md:flex items-center gap-8">
                            <a href="#features" className="text-dark-300 hover:text-white transition-colors">الميزات</a>
                            <a href="#pricing" className="text-dark-300 hover:text-white transition-colors">الأسعار</a>
                            <a href="#testimonials" className="text-dark-300 hover:text-white transition-colors">الآراء</a>
                        </div>
                        <div className="hidden md:flex items-center gap-3">
                            <button onClick={() => onNavigate('login')} className="px-4 py-2 text-dark-300 hover:text-white transition-colors">تسجيل الدخول</button>
                            <button onClick={() => onNavigate('register')} className="px-5 py-2.5 bg-brand-500 hover:bg-brand-600 rounded-xl text-white font-medium transition-colors">ابدأ مجانًا</button>
                        </div>
                        <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="md:hidden p-2 text-dark-300">
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={mobileMenuOpen ? "M6 18L18 6M6 6l12 12" : "M4 6h16M4 12h16M4 18h16"} /></svg>
                        </button>
                    </div>
                    {mobileMenuOpen && (
                        <div className="md:hidden bg-dark-900 border-t border-dark-700 p-4 space-y-3">
                            <button onClick={() => { onNavigate('login'); setMobileMenuOpen(false); }} className="block w-full text-right py-2 text-dark-300">تسجيل الدخول</button>
                            <button onClick={() => { onNavigate('register'); setMobileMenuOpen(false); }} className="block w-full py-3 bg-brand-500 rounded-xl text-white font-medium text-center">ابدأ مجانًا</button>
                        </div>
                    )}
                </nav>
            );
        }

        function HeroSection({ onNavigate }) {
            return (
                <section className="min-h-screen flex items-center justify-center relative hero-bg overflow-hidden">
                    <div className="absolute inset-0 overflow-hidden">
                        <div className="absolute top-20 right-20 w-72 h-72 bg-brand-500/20 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-20 left-20 w-96 h-96 bg-pink-500/10 rounded-full blur-3xl"></div>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 md:px-6 py-32 text-center relative z-10">
                        <div className="inline-block px-4 py-2 bg-brand-500/10 border border-brand-500/20 rounded-full text-brand-400 text-sm mb-6 fade-in-up">
                            🚀 المنصة الأولى لإدارة السوشيال ميديا
                        </div>
                        <h1 className="text-4xl md:text-7xl font-black text-white mb-6 leading-tight fade-in-up" style={{ animationDelay: '0.1s' }}>
                            أدر سوشيال ميديا<br />
                            <span className="gradient-text">بذكاء واحترافية</span>
                        </h1>
                        <p className="text-lg md:text-xl text-dark-300 max-w-2xl mx-auto mb-10 fade-in-up" style={{ animationDelay: '0.2s' }}>
                            منصة متكاملة لإدارة حساباتك على جميع المنصات. اكتب محتوى أفضل، جدول منشوراتك، وحلل أداءك - كلها في مكان واحد.
                        </p>
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-4 fade-in-up" style={{ animationDelay: '0.3s' }}>
                            <button onClick={() => onNavigate('register')} className="px-8 py-4 bg-brand-500 hover:bg-brand-600 rounded-2xl text-white font-bold text-lg transition-all hover:scale-105 glow">
                                ابدأ مجانًا الآن
                            </button>
                            <button className="px-8 py-4 bg-dark-800 hover:bg-dark-700 rounded-2xl text-white font-medium text-lg transition-all flex items-center gap-2">
                                <span>▶️</span> شاهد الفيديو
                            </button>
                        </div>
                        <div className="mt-16 flex flex-wrap items-center justify-center gap-4 md:gap-8 text-dark-400 text-sm fade-in-up" style={{ animationDelay: '0.4s' }}>
                            <div className="flex items-center gap-2"><span className="text-emerald-400">✓</span> بدون بطاقة ائتمان</div>
                            <div className="flex items-center gap-2"><span className="text-emerald-400">✓</span> إعداد في 2 دقيقة</div>
                            <div className="flex items-center gap-2"><span className="text-emerald-400">✓</span> إلغاء في أي وقت</div>
                        </div>
                    </div>
                </section>
            );
        }

        function FeaturesSection() {
            const features = [
                { icon: '📊', title: 'لوحة تحكم ذكية', description: 'نظرة شاملة على أداء حساباتك مع رسوم بيانية تفاعلية.' },
                { icon: '📅', title: 'تقويم المحتوى', description: 'جدول منشوراتك مسبقًا مع سحب وإفلات.' },
                { icon: '✍️', title: 'كاتب الكابشنات AI', description: 'ولّد كابشنات احترافية بالذكاء الاصطناعي.' },
                { icon: '🎨', title: 'مكتبة القوالب', description: 'أكثر من 100 قالب جاهز للتعديل.' },
                { icon: '#️⃣', title: 'بحث الهاشتاجات', description: 'ابحث عن أفضل الهاشتاجات الرائجة.' },
                { icon: '📈', title: 'تحليل الأداء', description: 'تقارير مفصلة لأفضل أوقات النشر.' },
                { icon: '💬', title: 'إدارة الرسائل', description: 'ردود جاهزة على الاستفسارات الشائعة.' },
                { icon: '🔄', title: 'إعادة استخدام المحتوى', description: 'حوّل منشور واحد إلى عدة صيغ مختلفة.' },

            return (

                                </div>

        function PricingSection({ onNavigate }) {
            const plans = [

                { name: 'Enterprise', price: '149', features: ['كل ميزات برو', 'فريق عمل (5 أعضاء)', 'API доступ', 'تقارير مخصصة', 'مدير حساب مخصص'], popular: false },

                <section id="pricing" className="py-20 md:py-32 relative">

                        </div>

                                    <ul className="space-y-3 mb-8">{plan.features.map((f, j) => <li key={j} className="flex items-center gap-2 text-dark-300 text-sm"><span className="text-emerald-400">✓</span>{f}</li>)}</ul>
                                    <button onClick={() => onNavigate('register')} className={`w-full py-3 rounded-xl font-medium transition-all ${plan.popular ? 'bg-brand-500 hover:bg-brand-600 text-white' : 'bg-dark-700 hover:bg-dark-600 text-white'}`}>ابدأ الآن</button>
                                </div>
                            ))}
                        </div>
                    </div>

            );
        }

        function TestimonialsSection() {
            const testimonials = [
                { name: 'سارة أحمد', role: 'صاحبة متجر', text: 'سوشيال فاست غيّر طريقة عملي بالكامل! تفاعل متابعيني زاد 300%.', rating: 5 },
                { name: 'خالد محمد', role: 'مدير تسويق', text: 'أفضل أداة لإدارة حسابات العملاء. tiếtّف الوقت و improves النتائج.', rating: 5 },
                { name: 'نورة سعيد', role: 'مؤثرة', text: 'كاتب الكابشنات وسّلني hours من الكتابة. أنصح فيه الجميع.', rating: 5 },
            ];
            return (
                <section id="testimonials" className="py-20 md:py-32 relative">
                    <div className="max-w-7xl mx-auto px-4 md:px-6">
                        <div className="text-center mb-16"><span className="text-brand-400 font-medium">الآراء</span><h2 className="text-3xl md:text-5xl font-black text-white mt-3">ماذا يقول عملاؤنا</h2></div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">

                                <div key={i} className="glass-card rounded-2xl p-6 hover-lift fade-in-up" style={{ animationDelay: `${i * 0.1}s` }}>

        // ==================== DASHBOARD PAGES ====================
        function DashboardPage() {
            const { user } = useAuth();
            const [posts, setPosts] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = db.collection('posts').where('userId', '==', user?.uid).orderBy('createdAt', 'desc').limit(5).onSnapshot(snapshot => {
                    setPosts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });
                return unsubscribe;
            }, [user]);

            const stats = [
                { title: 'إجمالي المنشورات', value: posts.length, icon: '📝', color: 'from-brand-500 to-brand-600' },
                { title: 'المنشورات المنشورة', value: posts.filter(p => p.status === 'published').length, icon: '✅', color: 'from-emerald-500 to-emerald-600' },
                { title: 'مسودات', value: posts.filter(p => p.status === 'draft').length, icon: '📝', color: 'from-amber-500 to-amber-600' },
                { title: 'مجدولة', value: posts.filter(p => p.status === 'scheduled').length, icon: '📅', color: 'from-pink-500 to-pink-600' },
            ];

            return (
                <div className="space-y-6 fade-in pb-20 md:pb-6">

        function App() {
            const [currentPage, setCurrentPage] = useState('landing');
            const navigate = (page) => { setCurrentPage(page); window.scrollTo(0, 0); };

            const renderPage = () => {
                switch (currentPage) {
                    case 'landing': return <LandingPage onNavigate={navigate} />;
                    case 'login': return <LoginPage onNavigate={navigate} />;
                    case 'register': return <RegisterPage onNavigate={navigate} />;
                    case 'dashboard': return <DashboardLayout onNavigate={navigate} />;
                    default: return <LandingPage onNavigate={navigate} />;
                }
            };
            return <div>{renderPage()}</div>;
        }

        function DashboardLayout({ onNavigate }) {
            const [activePage, setActivePage] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const pages = { dashboard: DashboardPage, calendar: CalendarPage, templates: TemplatesPage, captions: CaptionsPage, hashtags: HashtagsPage, media: MediaPage, messages: MessagesPage, analytics: AnalyticsPage, settings: SettingsPage };
            const Page = pages[activePage] || DashboardPage;
            return (
                <div className="flex min-h-screen bg-dark-950">
                    <Sidebar activePage={activePage} setActivePage={setActivePage} isOpen={sidebarOpen} setIsOpen={setSidebarOpen} onNavigate={onNavigate} />
                    <MobileNav activePage={activePage} setActivePage={setActivePage} />
                    <main className={`flex-1 transition-all duration-300 ${sidebarOpen ? 'md:mr-64' : 'md:mr-20'}`}>
                        <Header activePage={activePage} onNavigate={onNavigate} />
                        <div className="p-4 md:p-6"><Page /></div>
                    </main>
                </div>
            );
        }

        function Root() {
            return (
                <ThemeProvider>
                    <ToastProvider>
                        <AuthProvider>
                            <App />
                        </AuthProvider>
                    </ToastProvider>
                </ThemeProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
