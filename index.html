        // Bar Chart Component (Simple)

                            <span className="text-xs text-dark-400">{item.day}</span>
                        </div>
                    ))}
                </div>
            );

        // Line Chart Component (Simple)
        function LineChart({ data }) {
            const maxVal = Math.max(...data.map(d => d.engagement));
            const points = data.map((item, i) => {
                const x = (i / (data.length - 1)) * 100;
                const y = 100 - (item.engagement / maxVal) * 80;
                return `${x},${y}`;
            }).join(' ');

            return (
                <div className="h-32 mt-4">
                    <svg viewBox="0 0 100 100" className="w-full h-full" preserveAspectRatio="none">
                        <defs>

                                <stop offset="100%" stopColor="#6366f1" stopOpacity="0"/>
                            </linearGradient>

                            return <circle key={i} cx={x} cy={y} r="1" fill="#818cf8"/>;

                                <div className="bg-dark-800 rounded-xl p-4">
                                    <p className="text-dark-200 text-sm whitespace-pre-line leading-relaxed">{template.template}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Recent Messages */}
                    <div className="glass-card rounded-2xl p-6">
                        <h3 className="text-lg font-bold text-white mb-4">📩 رسائل حديثة</h3>
                        <div className="space-y-3">
                            {[
                                { id: 1, user: 'سارة أحمد', message: 'السلام عليكم، ب请问 السعر كم؟', time: '5 دقائق', status: 'جديد' },
                                { id: 2, user: 'خالد محمد', message: 'متى يوصل الطلب للرياض؟', time: '15 دقيقة', status: 'جديد' },
                                { id: 3, user: 'نورة سعيد', message: 'المنتج وصلني بحالة سيئة', time: 'ساعة', status: 'شكة' },
                            ].map(msg => (
                                <div key={msg.id} className="flex items-center gap-4 p-4 bg-dark-800/50 rounded-xl hover:bg-dark-800 transition-colors">
                                    <div className="w-10 h-10 rounded-full bg-gradient-to-br from-brand-500 to-pink-500 flex items-center justify-center text-white font-bold text-sm">
                                        {msg.user.charAt(0)}
                                    </div>
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2">
                                            <p className="text-white font-medium text-sm">{msg.user}</p>
                                            <span className={`px-2 py-0.5 rounded-full text-xs ${
                                                msg.status === 'شكة' ? 'bg-red-500/20 text-red-400' : 'bg-brand-500/20 text-brand-400'
                                            }`}>{msg.status}</span>
                                        </div>
                                        <p className="text-dark-400 text-sm truncate">{msg.message}</p>
                                    </div>
                                    <span className="text-dark-500 text-xs">{msg.time}</span>
                                    <button className="px-3 py-1.5 bg-brand-500 text-white rounded-lg text-xs hover:bg-brand-600 transition-colors">
                                        رد
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Analytics Page
        function AnalyticsPage() {
            const [period, setPeriod] = useState('أسبوعي');

            const platformStats = [
                { name: 'إنستغرام', followers: '12,345', engagement: '5.2%', posts: 28, color: 'from-pink-500 to-purple-500' },
                { name: 'تيك توك', followers: '8,234', engagement: '7.8%', posts: 15, color: 'from-dark-700 to-dark-900' },
                { name: 'فيسبوك', followers: '3,456', engagement: '3.1%', posts: 20, color: 'from-blue-500 to-blue-700' },
                { name: 'تويتر', followers: '554', engagement: '2.4%', posts: 35, color: 'from-sky-400 to-sky-600' },
            ];

            const topPosts = [
                { id: 1, title: 'عرض الصيف - خصم 30%', platform: 'إنستغرام', reach: '15,234', engagement: '8.2%', saves: 234 },
                { id: 2, title: 'منتج جديد - سماعات', platform: 'تيك توك', reach: '23,456', engagement: '12.1%', saves: 567 },
                { id: 3, title: 'رأي عميل - فيديو', platform: 'فيسبوك', reach: '8,901', engagement: '6.5%', saves: 123 },
            ];

            const bestTimes = [
                { time: '7:00 صباحاً', score: 65 },
                { time: '12:00 ظهراً', score: 80 },
                { time: '5:00 مساءً', score: 90 },
                { time: '8:00 مساءً', score: 95 },
                { time: '10:00 مساءً', score: 75 },
            ];

            return (
                <div className="space-y-6 fade-in">
                    {/* Header */}
                    <div className="flex items-center justify-between">
                        <div>
                            <h3 className="text-2xl font-bold text-white">تحليل الأداء</h3>
                            <p className="text-dark-400">نظرة شاملة على أداء حساباتك</p>
                        </div>
                        <div className="flex gap-2">
                            {['أسبوعي', 'شهري', 'سنوي'].map(p => (
                                <button
                                    key={p}
                                    onClick={() => setPeriod(p)}
                                    className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${
                                        period === p ? 'bg-brand-500 text-white' : 'bg-dark-800 text-dark-300 hover:bg-dark-700'
                                    }`}
                                >
                                    {p}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Overview Stats */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-dark-400 text-sm">إجمالي الوصول</p>
                            <p className="text-2xl font-bold text-white mt-1">45,234</p>
                            <p className="text-emerald-400 text-xs mt-1">↑ 15.3%</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-dark-400 text-sm">إجمالي التفاعل</p>
                            <p className="text-2xl font-bold text-white mt-1">8,901</p>
                            <p className="text-emerald-400 text-xs mt-1">↑ 8.7%</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-dark-400 text-sm">النقرات على الرابط</p>
                            <p className="text-2xl font-bold text-white mt-1">1,234</p>
                            <p className="text-emerald-400 text-xs mt-1">↑ 22.1%</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-dark-400 text-sm">المحادثات الجديدة</p>
                            <p className="text-2xl font-bold text-white mt-1">47</p>
                            <p className="text-emerald-400 text-xs mt-1">↑ 12.5%</p>
                        </div>
                    </div>

                    {/* Platform Performance */}
                    <div className="glass-card rounded-2xl p-6">
                        <h3 className="text-lg font-bold text-white mb-4">📊 أداء المنصات</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            {platformStats.map((platform, i) => (
                                <div key={i} className="bg-dark-800/50 rounded-xl p-4 hover:bg-dark-800 transition-colors">
                                    <div className={`w-12 h-12 rounded-xl bg-gradient-to-br ${platform.color} flex items-center justify-center text-white font-bold mb-3`}>
                                        {platform.name.charAt(0)}
                                    </div>
                                    <h4 className="text-white font-bold">{platform.name}</h4>
                                    <div className="mt-3 space-y-2">
                                        <div className="flex justify-between text-sm">
                                            <span className="text-dark-400">المتابعون</span>
                                            <span className="text-white">{platform.followers}</span>
                                        </div>
                                        <div className="flex justify-between text-sm">
                                            <span className="text-dark-400">التفاعل</span>
                                            <span className="text-emerald-400">{platform.engagement}</span>
                                        </div>
                                        <div className="flex justify-between text-sm">
                                            <span className="text-dark-400">المنشورات</span>
                                            <span className="text-white">{platform.posts}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Top Posts */}
                    <div className="glass-card rounded-2xl p-6">
                        <h3 className="text-lg font-bold text-white mb-4">🏆 أفضل المنشورات أداءً</h3>
                        <div className="space-y-3">
                            {topPosts.map((post, i) => (
                                <div key={post.id} className="flex items-center gap-4 p-4 bg-dark-800/50 rounded-xl hover:bg-dark-800 transition-colors">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-500 flex items-center justify-center text-white font-bold">
                                        #{i + 1}
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-white font-medium">{post.title}</p>
                                        <p className="text-dark-400 text-sm">{post.platform}</p>
                                    </div>
                                    <div className="text-left space-y-1">
                                        <p className="text-white text-sm">الوصول: <span className="text-brand-400">{post.reach}</span></p>
                                        <p className="text-white text-sm">التفاعل: <span className="text-emerald-400">{post.engagement}</span></p>
                                    </div>
                                    <div className="text-center">
                                        <p className="text-amber-400 text-lg">💾</p>
                                        <p className="text-dark-400 text-xs">{post.saves}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Best Times */}
                    <div className="glass-card rounded-2xl p-6">
                        <h3 className="text-lg font-bold text-white mb-4">⏰ أفضل أوقات النشر</h3>
                        <div className="space-y-3">
                            {bestTimes.map((item, i) => (
                                <div key={i} className="flex items-center gap-4">
                                    <span className="text-dark-300 text-sm w-24">{item.time}</span>
                                    <div className="flex-1 h-8 bg-dark-800 rounded-full overflow-hidden">
                                        <div
                                            className="h-full bg-gradient-to-l from-brand-500 to-brand-400 rounded-full flex items-center justify-end pr-3 transition-all duration-1000"
                                            style={{ width: `${item.score}%` }}
                                        >
                                            <span className="text-white text-xs font-bold">{item.score}%</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <p className="text-dark-400 text-sm mt-4">💡 أفضل وقت للنشر: 8:00 مساءً (التفاعل الأعلى)</p>
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const [activePage, setActivePage] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);

            const renderPage = () => {
                switch (activePage) {
                    case 'dashboard': return <DashboardPage />;
                    case 'calendar': return <CalendarPage />;
                    case 'templates': return <TemplatesPage />;
                    case 'captions': return <CaptionsPage />;
                    case 'messages': return <MessagesPage />;
                    case 'analytics': return <AnalyticsPage />;
                    default: return <DashboardPage />;
                }
            };

            return (
                <div className="flex min-h-screen bg-dark-950">
                    <Sidebar
                        activePage={activePage}
                        setActivePage={setActivePage}
                        isOpen={sidebarOpen}
                        setIsOpen={setSidebarOpen}
                    />
                    <main className={`flex-1 transition-all duration-300 ${sidebarOpen ? 'mr-64' : 'mr-20'}`}>
                        <Header activePage={activePage} />
                        <div className="p-6">
                            {renderPage()}
                        </div>
                    </main>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
