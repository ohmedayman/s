<body class="text-slate-800 font-tajawal">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;

        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyD3IT_cpG8umAO41FLeOSCOzt4whyndWUI",
            authDomain: "socialmedia-byvexonet.firebaseapp.com",
            projectId: "socialmedia-byvexonet",
            storageBucket: "socialmedia-byvexonet.firebasestorage.app",
            messagingSenderId: "811962367877",
            appId: "1:811962367877:web:380f89a7559485a3ca8eec"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // ==================== CONTEXTS ====================
        const AuthContext = createContext();
        const ToastContext = createContext();

        function useAuth() { return useContext(AuthContext); }
        function useToast() { return useContext(ToastContext); }

        // ==================== TOAST PROVIDER ====================
        function ToastProvider({ children }) {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };
            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed top-4 left-4 z-[100] space-y-3">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`toast px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 backdrop-blur-xl ${toast.type === 'success' ? 'bg-emerald-500/90 text-white' : toast.type === 'error' ? 'bg-red-500/90 text-white' : 'bg-brand-500/90 text-white'}`}>
                                <span className="text-xl">{toast.type === 'success' ? '✓' : toast.type === 'error' ? '✕' : 'ℹ'}</span>
                                <span className="text-sm font-medium">{toast.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        }

        // ==================== AUTH PROVIDER ====================
        function AuthProvider({ children }) {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [userData, setUserData] = useState(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (user) => {
                    setUser(user);
                    if (user) {
                        const doc = await db.collection('users').doc(user.uid).get();
                        if (doc.exists) setUserData(doc.data());
                        else {
                            const newUserData = { name: user.displayName || 'مستخدم', email: user.email, plan: 'free', createdAt: new Date().toISOString() };
                            await db.collection('users').doc(user.uid).set(newUserData);
                            setUserData(newUserData);
                        }
                    } else { setUserData(null); }
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            const loginWithEmail = (email, password) => auth.signInWithEmailAndPassword(email, password);
            const registerWithEmail = async (email, password, name) => {
                const res = await auth.createUserWithEmailAndPassword(email, password);
                await res.user.updateProfile({ displayName: name });
                await db.collection('users').doc(res.user.uid).set({ name, email, plan: 'free', createdAt: new Date().toISOString() });
                return res;
            };
            const loginWithGoogle = async () => {
                const res = await auth.signInWithPopup(googleProvider);
                const doc = await db.collection('users').doc(res.user.uid).get();
                if (!doc.exists) await db.collection('users').doc(res.user.uid).set({ name: res.user.displayName, email: res.user.email, plan: 'free', createdAt: new Date().toISOString() });
                return res;
            };
            const logout = () => auth.signOut();
            const resetPassword = (email) => auth.sendPasswordResetEmail(email);
            const updateProfile = async (data) => { await db.collection('users').doc(user.uid).update(data); setUserData(prev => ({ ...prev, ...data })); };

            const value = { user, userData, loading, loginWithEmail, registerWithEmail, loginWithGoogle, logout, resetPassword, updateProfile };
            return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
        }

        // ==================== HELPERS ====================
        function LoadingSpinner() {
            return <div className="flex items-center justify-center py-20"><div className="spinner"></div></div>;
        }

        function Modal({ isOpen, onClose, title, children }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 modal-overlay" onClick={onClose}>
                    <div className="glass-card rounded-3xl w-full max-w-md mx-4 modal-content" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between p-6 border-b border-slate-100">
                            <h3 className="text-xl font-bold text-slate-800">{title}</h3>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-500 transition-colors">✕</button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        }

        // ==================== LANDING PAGE ====================
        function Navbar({ onNavigate }) {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'bg-white/80 backdrop-blur-xl shadow-lg shadow-slate-200/50' : ''}`}>

                        <div className="flex items-center gap-3">

                            <span className="text-2xl font-black text-gradient">سوشيال فاست</span>
                        </div>
                        <div className="hidden md:flex items-center gap-8">
                            <a href="#features" className="text-slate-600 hover:text-brand-600 transition-colors font-medium">الميزات</a>
                            <a href="#pricing" className="text-slate-600 hover:text-brand-600 transition-colors font-medium">الأسعار</a>
                            <a href="#testimonials" className="text-slate-600 hover:text-brand-600 transition-colors font-medium">الآراء</a>
                        </div>
                        <div className="hidden md:flex items-center gap-3">
                            <button onClick={() => onNavigate('login')} className="px-5 py-2.5 text-slate-600 hover:text-brand-600 transition-colors font-medium">تسجيل الدخول</button>
                            <button onClick={() => onNavigate('register')} className="btn-primary px-6 py-2.5 rounded-xl text-white font-bold ripple">ابدأ مجانًا</button>
                        </div>
                    </div>
                </nav>
            );
        }

        function HeroSection({ onNavigate }) {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            useEffect(() => {
                const handleMouseMove = (e) => setMousePos({ x: e.clientX / 50, y: e.clientY / 50 });
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);
            return (
                <section className="min-h-screen flex items-center justify-center relative hero-bg overflow-hidden pt-20">
                    <div className="absolute inset-0 overflow-hidden pointer-events-none">

                        <div className="absolute bottom-20 left-20 w-96 h-96 bg-pink-400/15 rounded-full blur-3xl" style={{ transform: `translate(${-mousePos.x}px, ${-mousePos.y}px)` }}></div>
                        <div className="absolute top-1/2 left-1/2 w-64 h-64 bg-purple-400/10 rounded-full blur-3xl" style={{ transform: `translate(${-mousePos.x * 2}px, ${mousePos.y * 2}px)` }}></div>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 md:px-6 py-20 text-center relative z-10">
                        <div className="inline-block px-6 py-3 bg-brand-50 border border-brand-200 rounded-full text-brand-600 text-sm font-bold mb-8 fade-in-up animate-bounce-slow">
                            🚀 المنصة العربية الأولى لإدارة السوشيال ميديا
                        </div>
                        <h1 className="text-5xl md:text-8xl font-black text-slate-800 mb-8 leading-tight fade-in-up" style={{ animationDelay: '0.1s' }}>
                            أدر سوشيال ميديا<br />
                            <span className="text-gradient">بذكاء واحترافية</span>
                        </h1>
                        <p className="text-xl md:text-2xl text-slate-500 max-w-3xl mx-auto mb-12 fade-in-up leading-relaxed" style={{ animationDelay: '0.2s' }}>
                            منصة متكاملة لإدارة حساباتك على جميع المنصات. اكتب محتوى أفضل، جدول منشوراتك، وحلل أداءك - كلها في مكان واحد
                        </p>
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-4 fade-in-up" style={{ animationDelay: '0.3s' }}>
                            <button onClick={() => onNavigate('register')} className="px-10 py-5 btn-primary rounded-2xl text-white font-black text-lg ripple glow">
                                ابدأ مجانًا الآن
                            </button>
                            <button className="px-10 py-5 bg-white border-2 border-slate-200 hover:border-brand-300 rounded-2xl text-slate-700 font-bold text-lg transition-all hover:shadow-xl flex items-center gap-3">
                                <span className="w-12 h-12 rounded-full bg-brand-100 flex items-center justify-center">▶️</span>
                                شاهد الفيديو التعريفي
                            </button>
                        </div>
                        <div className="mt-16 flex flex-wrap items-center justify-center gap-6 text-slate-500 text-sm fade-in-up" style={{ animationDelay: '0.4s' }}>
                            <div className="flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs">✓</span> بدون بطاقة ائتمان</div>
                            <div className="flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs">✓</span> إعداد في 2 دقيقة</div>
                            <div className="flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs">✓</span> إلغاء في أي وقت</div>
                        </div>
                    </div>
                </section>
            );
        }

        function FeaturesSection() {
            const features = [
                { icon: '📊', title: 'لوحة تحكم ذكية', description: 'نظرة شاملة على أداء حساباتك مع رسوم بيانية تفاعلية وإحصائيات مفصلة.', color: 'from-blue-500 to-cyan-500' },
                { icon: '📅', title: 'تقويم المحتوى', description: 'جدول منشوراتك مسبقًا مع سحب وإفلات وتنبيهات ذكية.', color: 'from-purple-500 to-pink-500' },
                { icon: '🤖', title: 'مولّد المحتوى AI', description: 'ولّد محتوى احترافي بالذكاء الاصطناعي لكل المنصات.', color: 'from-brand-500 to-accent-500' },
                { icon: '🎨', title: 'مكتبة القوالب', description: 'أكثر من 100 قالب جاهز للتعديل يناسب جميع أنواع المحتوى.', color: 'from-pink-500 to-rose-500' },
                { icon: '#️⃣', title: 'بحث الهاشتاجات', description: 'ابحث عن أفضل الهاشتاجات الرائجة وتابع أداءها.', color: 'from-amber-500 to-orange-500' },
                { icon: '📈', title: 'تحليل الأداء', description: 'تقارير مفصلة لأفضل أوقات النشر والمحتوى الأعلى تفاعلًا.', color: 'from-emerald-500 to-teal-500' },
                { icon: '💬', title: 'إدارة الرسائل', description: 'ردود جاهزة على الاستفسارات الشائعة مع ردود ذكية.', color: 'from-indigo-500 to-blue-500' },
                { icon: '👥', title: 'فريق العمل', description: 'تعاون مع فريقك على إدارة المحتوى والمنشورات.', color: 'from-violet-500 to-purple-500' },
                { icon: '💰', title: 'حاسبة العائد', description: 'احسب عائد استثمارك في كل حملة تسويقية.', color: 'from-rose-500 to-red-500' },
            ];
            return (
                <section id="features" className="py-24 md:py-32 relative">
                    <div className="max-w-7xl mx-auto px-4 md:px-6">

                            <h2 className="text-4xl md:text-6xl font-black text-slate-800 mt-3">كل ما تحتاجه في مكان واحد</h2>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {features.map((f, i) => (

                                    <h3 className="text-xl font-bold text-slate-800 mb-3">{f.title}</h3>

        function PricingSection({ onNavigate }) {
            const plans = [

                { name: 'Enterprise', price: '599', originalPrice: '999', period: 'شهريًا', features: ['كل ميزات برو', 'فريق عمل (10 أعضاء)', 'API доступ', 'تقارير مخصصة', 'مدير حساب مخصص', 'SLA 99.9%'], popular: false, color: 'from-emerald-500 to-teal-500' },

            return (
                <section id="pricing" className="py-24 md:py-32 relative">

            const { user } = useAuth();
            const { addToast } = useToast();
            const [files, setFiles] = useState([]);
            const fileInput = useRef(null);
            useEffect(() => { if (user) db.collection('media').where('userId', '==', user.uid).onSnapshot(s => setFiles(s.docs.map(d => ({ id: d.id, ...d.data() })))); }, [user]);
            const uploadFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                addToast('جاري الرفع...');
                const storageRef = storage.ref(`media/${user.uid}/${file.name}`);
                await storageRef.put(file);
                const url = await storageRef.getDownloadURL();
                await db.collection('media').add({ name: file.name, type: file.type, size: file.size, url, userId: user.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                addToast('تم رفع الملف!');
            };

                <div className="space-y-6 fade-in pb-20 md:pb-6">
                    <div className="flex items-center justify-between"><h3 className="text-xl md:text-2xl font-bold text-slate-800">مكتبة الوسائط</h3><input type="file" ref={fileInput} onChange={uploadFile} className="hidden" accept="image/*,video/*" /><button onClick={() => fileInput.current.click()} className="px-5 py-2.5 btn-primary rounded-xl text-white font-bold ripple">+ رفع ملف</button></div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">{files.map(file => <div key={file.id} className="glass-card rounded-2xl overflow-hidden card-hover"><div className="h-32 bg-gradient-to-br from-brand-100 to-pink-100 flex items-center justify-center">{file.type?.startsWith('image/') ? <img src={file.url} className="w-full h-full object-cover" /> : <span className="text-4xl">🎬</span>}</div><div className="p-3"><p className="text-slate-800 text-sm font-medium truncate">{file.name}</p></div></div>)}</div>
                    {files.length === 0 && <p className="text-slate-400 text-center py-12">لا توجد ملفات بعد</p>}
                </div>
            );
        }

        function TeamPage() {
            const { user } = useAuth();
            const { addToast } = useToast();
            const [team, setTeam] = useState([]);
            const [showInvite, setShowInvite] = useState(false);
            const [inviteEmail, setInviteEmail] = useState('');
            useEffect(() => { if (user) db.collection('teams').where('ownerId', '==', user.uid).onSnapshot(s => setTeam(s.docs.map(d => ({ id: d.id, ...d.data() })))), }, [user]);
            const inviteMember = async () => {
                if (!inviteEmail) return;
                await db.collection('teams').add({ ownerId: user.uid, email: inviteEmail, role: 'editor', status: 'pending', invitedBy: user.displayName || user.email, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                setShowInvite(false); setInviteEmail(''); addToast('تم إرسال الدعوة!');
            };
            return (
                <div className="space-y-6 fade-in pb-20 md:pb-6">
                    <div className="flex items-center justify-between"><h3 className="text-xl md:text-2xl font-bold text-slate-800">👥 فريق العمل</h3><button onClick={() => setShowInvite(true)} className="px-5 py-2.5 btn-primary rounded-xl text-white font-bold ripple">+ دعوة عضو</button></div>
                    <div className="glass-card rounded-2xl p-6">
                        <div className="space-y-3">
                            <div className="flex items-center gap-4 p-4 bg-brand-50 rounded-xl border border-brand-200"><div className="w-12 h-12 rounded-xl gradient-brand flex items-center justify-center text-white font-bold shadow-lg">{user?.displayName?.charAt(0) || 'م'}</div><div className="flex-1"><p className="text-slate-800 font-bold">{user?.displayName || 'أنت'}</p><p className="text-slate-500 text-sm">{user?.email}</p></div><span className="px-3 py-1 bg-brand-500 text-white rounded-full text-xs font-bold">مالك</span></div>
                            {team.map(m => <div key={m.id} className="flex items-center gap-4 p-4 bg-slate-50 rounded-xl"><div className="w-12 h-12 rounded-xl bg-gradient-to-br from-brand-500 to-accent-500 flex items-center justify-center text-white font-bold">{m.email.charAt(0).toUpperCase()}</div><div className="flex-1"><p className="text-slate-800 font-medium">{m.email}</p></div><span className="px-3 py-1 bg-slate-200 text-slate-600 rounded-full text-xs font-bold">{m.role === 'editor' ? 'محرر' : 'مشاهد'}</span></div>)}
                        </div>
                    </div>
                    <Modal isOpen={showInvite} onClose={() => setShowInvite(false)} title="دعوة عضو جديد">
                        <div className="space-y-4">
                            <div><label className="block text-slate-600 text-sm font-medium mb-2">البريد الإلكتروني</label><input type="email" value={inviteEmail} onChange={e => setInviteEmail(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-800 focus:outline-none input-focus" /></div>
                            <button onClick={inviteMember} className="w-full py-3 btn-primary rounded-xl text-white font-bold ripple">إرسال الدعوة</button>
                        </div>
                    </Modal>
                </div>
            );
        }

        function MessagesPage() {
            const { addToast } = useToast();
            const templates = [
                { id: 1, category: 'استفسار سعر', template: 'مرحبًا! 😊\nسعر المنتج هو [السعر] جنيه مصري\nمع شحن مجاني للطلبات فوق 500 جنيه' },
                { id: 2, category: 'شحن', template: 'مرحبًا! 📦\nالشحن خلال 3-5 أيام عمل داخل مصر' },
                { id: 3, category: 'شكوى', template: 'مرحبًا! نعتذر عن أي إزعاج 🙏\nنحب نحل المشكلة فورًا' },
            ];
            return (
                <div className="space-y-6 fade-in pb-20 md:pb-6">
                    <h3 className="text-xl md:text-2xl font-bold text-slate-800">إدارة الرسائل</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">{templates.map(t => <div key={t.id} className="glass-card rounded-2xl p-5"><div className="flex items-center justify-between mb-3"><h4 className="text-slate-800 font-bold">{t.category}</h4><button onClick={() => { navigator.clipboard.writeText(t.template); addToast('تم النسخ!'); }} className="px-3 py-1.5 bg-brand-50 text-brand-600 rounded-lg text-xs font-medium">نسخ</button></div><div className="bg-slate-50 rounded-xl p-4"><p className="text-slate-600 text-sm whitespace-pre-line">{t.template}</p></div></div>)}</div>
                </div>
            );
        }

        function AnalyticsPage() {
            const { user } = useAuth();
            const [posts, setPosts] = useState([]);
            useEffect(() => { if (user) db.collection('posts').where('userId', '==', user.uid).onSnapshot(s => setPosts(s.docs.map(d => ({ id: d.id, ...d.data() })))); }, [user]);
            return (
                <div className="space-y-6 fade-in pb-20 md:pb-6">
                    <h3 className="text-xl md:text-2xl font-bold text-slate-800">تحليل الأداء</h3>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="glass-card rounded-2xl p-5 text-center card-hover"><p className="text-4xl font-black text-slate-800">{posts.length}</p><p className="text-slate-500 text-sm mt-1">إجمالي المنشورات</p></div>
                        <div className="glass-card rounded-2xl p-5 text-center card-hover"><p className="text-4xl font-black text-emerald-500">{posts.filter(p => p.status === 'published').length}</p><p className="text-slate-500 text-sm mt-1">منشور</p></div>
                        <div className="glass-card rounded-2xl p-5 text-center card-hover"><p className="text-4xl font-black text-amber-500">{posts.filter(p => p.status === 'draft').length}</p><p className="text-slate-500 text-sm mt-1">مسودة</p></div>
                        <div className="glass-card rounded-2xl p-5 text-center card-hover"><p className="text-4xl font-black text-brand-500">4</p><p className="text-slate-500 text-sm mt-1">منصات</p></div>
                    </div>
                </div>
            );
        }

        function SettingsPage() {
            const { user, userData, updateProfile } = useAuth();
            const { addToast } = useToast();
            const [name, setName] = useState(userData?.name || '');
            const [saving, setSaving] = useState(false);
            const save = async () => { setSaving(true); await updateProfile({ name }); addToast('تم الحفظ!'); setSaving(false); };
            return (
                <div className="space-y-6 fade-in pb-20 md:pb-6">
                    <h3 className="text-xl md:text-2xl font-bold text-slate-800">الإعدادات</h3>
                    <div className="glass-card rounded-2xl p-6 space-y-4">
                        <h4 className="text-lg font-bold text-slate-800">الملف الشخصي</h4>
                        <div><label className="block text-slate-600 text-sm font-medium mb-2">الاسم</label><input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-slate-800 focus:outline-none input-focus" /></div>
                        <div><label className="block text-slate-600 text-sm font-medium mb-2">البريد</label><input type="email" value={user?.email || ''} disabled className="w-full bg-slate-100 border border-slate-200 rounded-xl px-5 py-4 text-slate-500" /></div>
                        <button onClick={save} disabled={saving} className="px-8 py-3 btn-primary rounded-xl text-white font-bold ripple">{saving ? 'جاري الحفظ...' : '💾 حفظ التغييرات'}</button>
                    </div>
                    <div className="glass-card rounded-2xl p-6">
                        <h4 className="text-lg font-bold text-slate-800 mb-4">الاشتراك</h4>
                        <div className="flex items-center gap-4 p-4 bg-slate-50 rounded-xl"><div className="w-12 h-12 rounded-xl bg-brand-100 flex items-center justify-center text-brand-600 text-xl">⭐</div><div className="flex-1"><p className="text-slate-800 font-bold">{userData?.plan === 'pro' ? 'الخطة المدفوعة' : 'الخطة المجانية'}</p><p className="text-slate-500 text-sm">{userData?.plan === 'pro' ? 'جميع الميزات' : '3 منشورات شهريًا'}</p></div><button className="px-5 py-2 btn-primary rounded-xl text-white text-sm font-bold">ترقية - 199 جنيه/شهر</button></div>
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const [currentPage, setCurrentPage] = useState('landing');
            const navigate = (page) => { setCurrentPage(page); window.scrollTo(0, 0); };
            const renderPage = () => {
                switch (currentPage) {
                    case 'landing': return <LandingPage onNavigate={navigate} />;
                    case 'login': return <LoginPage onNavigate={navigate} />;
                    case 'register': return <RegisterPage onNavigate={navigate} />;
                    case 'dashboard': return <DashboardLayout onNavigate={navigate} />;
                    default: return <LandingPage onNavigate={navigate} />;
                }
            };
            return <div>{renderPage()}</div>;
        }

        function DashboardLayout({ onNavigate }) {
            const [activePage, setActivePage] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const pages = { dashboard: DashboardPage, ai: AIContentPage, calendar: CalendarPage, templates: TemplatesPage, captions: CaptionsPage, hashtags: HashtagsPage, media: MediaPage, team: TeamPage, messages: MessagesPage, analytics: AnalyticsPage, settings: SettingsPage };
            const Page = pages[activePage] || DashboardPage;
            return (
                <div className="flex min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-purple-50">
                    <Sidebar activePage={activePage} setActivePage={setActivePage} isOpen={sidebarOpen} setIsOpen={setSidebarOpen} />
                    <MobileNav activePage={activePage} setActivePage={setActivePage} />
                    <main className={`flex-1 transition-all duration-300 ${sidebarOpen ? 'md:mr-64' : 'md:mr-20'}`}>
                        <Header activePage={activePage} onNavigate={onNavigate} />
                        <div className="p-4 md:p-6"><Page /></div>
                    </main>
                </div>
            );
        }

        function Root() {
            return (
                <ToastProvider>
                    <AuthProvider>
                        <App />
                    </AuthProvider>
                </ToastProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
