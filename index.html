        function BarChart({ data }) {
            const maxVal = Math.max(...data.map(d => d.reach));

                        <div key={i} className="flex-1 flex flex-col items-center gap-2">
                            <div className="w-full rounded-t-lg bg-gradient-to-t from-brand-600 to-brand-400 transition-all duration-500 hover:from-pink-600 hover:to-pink-400" style={{ height: `${(item.reach / maxVal) * 100}%` }}></div>

                        </div>
                    ))}
                </div>
            );
        }

        function LineChart({ data }) {
            const maxVal = Math.max(...data.map(d => d.engagement));
            const points = data.map((item, i) => `${(i / (data.length - 1)) * 100},${100 - (item.engagement / maxVal) * 80}`).join(' ');
            return (
                <div className="h-32 mt-4">
                    <svg viewBox="0 0 100 100" className="w-full h-full" preserveAspectRatio="none">
                        <defs><linearGradient id="lg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stopColor="#6366f1" stopOpacity="0.3"/><stop offset="100%" stopColor="#6366f1" stopOpacity="0"/></linearGradient></defs>
                        <polygon points={`0,100 ${points} 100,100`} fill="url(#lg)"/>
                        <polyline points={points} fill="none" stroke="#6366f1" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round"/>
                        {data.map((item, i) => <circle key={i} cx={(i / (data.length - 1)) * 100} cy={100 - (item.engagement / maxVal) * 80} r="1" fill="#818cf8"/>)}
                    </svg>
                </div>
            );
        }

                        <div className="glass-card rounded-2xl p-6"><div className="flex items-center justify-between mb-4"><h3 className="text-lg font-bold text-white">معدل التفاعل</h3></div><LineChart data={weeklyData} /></div>
                    </div>
                    <div className="glass-card rounded-2xl p-6">
                        <h3 className="text-lg font-bold text-white mb-4">آخر المنشورات</h3>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead><tr className="text-dark-400 text-sm border-b border-dark-700"><th className="text-right pb-3">المنشور</th><th className="text-right pb-3">المنصة</th><th className="text-right pb-3">الحالة</th><th className="text-right pb-3">التفاعل</th></tr></thead>
                                <tbody>{recentPosts.map(p => (
                                    <tr key={p.id} className="border-b border-dark-800 hover:bg-dark-800/50">
                                        <td className="py-4 text-white font-medium">{p.title}</td>
                                        <td className="py-4"><span className="px-3 py-1 rounded-full text-xs bg-brand-500/20 text-brand-400">{p.platform}</span></td>
                                        <td className="py-4"><span className={`px-3 py-1 rounded-full text-xs ${p.status === 'منشور' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>{p.status}</span></td>
                                        <td className="py-4 text-dark-300">{p.engagement}</td>
                                    </tr>
                                ))}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function CalendarPage() {
            const days = ['سبت', 'أحد', 'اثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة'];
            return (
                <div className="space-y-6 fade-in">
                    <div className="flex items-center justify-between"><h3 className="text-2xl font-bold text-white">يوليو 2026</h3><button className="px-5 py-2.5 bg-brand-500 hover:bg-brand-600 rounded-xl text-white font-medium flex items-center gap-2"><span>+</span>إضافة</button></div>
                    <div className="glass-card rounded-2xl p-6">
                        <div className="grid grid-cols-7 gap-2 mb-4">{days.map(d => <div key={d} className="text-center text-dark-400 text-sm py-2">{d}</div>)}</div>
                        <div className="grid grid-cols-7 gap-2">
                            {Array.from({length:3}).map((_,i) => <div key={`e${i}`} className="h-24 bg-dark-800/30 rounded-xl"></div>)}
                            {Array.from({length:31}).map((_,i) => <div key={i} className={`h-24 rounded-xl p-2 ${i+1===9?'bg-brand-500/10 border-2 border-brand-500':'bg-dark-800/50 hover:bg-dark-700/50'} transition-all cursor-pointer`}><span className={`text-sm ${i+1===9?'text-brand-400':'text-dark-300'}`}>{i+1}</span></div>)}
                        </div>
                    </div>
                </div>
            );
        }

        function TemplatesPage() {
            return (
                <div className="space-y-6 fade-in">
                    <h3 className="text-2xl font-bold text-white">مكتبة القوالب</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">{templates.map(t => (
                        <div key={t.id} className="glass-card rounded-2xl overflow-hidden hover-lift">
                            <div className={`h-32 bg-gradient-to-br ${t.color} flex items-center justify-center`}><p className="text-white text-xl font-bold">{t.preview}</p></div>
                            <div className="p-4"><h4 className="text-white font-bold">{t.name}</h4><p className="text-dark-400 text-sm mt-1">{t.description}</p><button className="w-full mt-3 px-4 py-2 bg-brand-500/20 text-brand-400 rounded-lg text-sm hover:bg-brand-500/30">استخدام</button></div>
                        </div>
                    ))}</div>
                </div>
            );
        }

        function CaptionsPage() {
            const [input, setInput] = useState('');
            const [results, setResults] = useState(null);
            const generate = () => {
                if (!input.trim()) return;
                setResults([
                    { title: 'رسمي', caption: `📢 ${input}\n\nنقدم لكم أفضل المنتجات بجودة عالية\n\n🛒 اطلب الآن!`, hashtags: '#تسوق #عروض #جودة' },
                    { title: 'حماسي', caption: `🔥 ${input} 🔥\n\nلا تفوّت الفرصة! ✨`, hashtags: '#عرض_حصري #تسوق_الان' },
                    { title: 'عاطفي', caption: `💜 ${input}\n\nنعرف إنكم تستاهلون الأفضل ❤️`, hashtags: '#عملائنا_أغلى #ثقة' },
                ]);
            };
            const copy = (t) => { navigator.clipboard.writeText(t); alert('تم النسخ!'); };
            return (
                <div className="space-y-6 fade-in">
                    <div className="glass-card rounded-2xl p-6">
                        <textarea value={input} onChange={e => setInput(e.target.value)} className="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 h-32 resize-none" placeholder="اكتب فكرة المنشور..." />
                        <button onClick={generate} className="mt-4 px-6 py-3 bg-brand-500 hover:bg-brand-600 rounded-xl text-white font-medium">✨ توليد الكابشنات</button>
                    </div>
                    {results && <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">{results.map((c,i) => (
                        <div key={i} className="glass-card rounded-2xl p-5 slide-in">
                            <h4 className="text-brand-400 font-bold mb-3">{c.title}</h4>
                            <div className="bg-dark-800 rounded-xl p-4 mb-3"><p className="text-white text-sm whitespace-pre-line">{c.caption}</p></div>
                            <p className="text-brand-300 text-xs mb-3">{c.hashtags}</p>
                            <button onClick={() => copy(c.caption)} className="w-full px-3 py-2 bg-brand-500/20 text-brand-400 rounded-lg text-sm">نسخ</button>
                        </div>
                    ))}</div>}
                </div>
            );
        }

        function HashtagsPage() {
            const [search, setSearch] = useState('');
            const tags = ['#تسوق_اونلاين', '#عروض', '#منتجات', '#خصم', '#شحن_سريع', '#جودة_عالية', '#ماركتنج', '#سوشيال_ميديا'];
            const filtered = tags.filter(t => t.includes(search));
            return (
                <div className="space-y-6 fade-in">
                    <input type="text" value={search} onChange={e => setSearch(e.target.value)} className="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500" placeholder="ابحث عن هاشتاج..." />
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">{filtered.map((t,i) => (
                        <div key={i} className="glass-card rounded-xl p-4 hover-lift cursor-pointer" onClick={() => { navigator.clipboard.writeText(t); alert('تم النسخ!'); }}>
                            <p className="text-brand-400 font-bold">{t}</p>
                            <p className="text-dark-400 text-sm mt-1">اضغط للنسخ</p>
                        </div>
                    ))}</div>
                </div>
            );
        }

        function MessagesPage() {
            return (
                <div className="space-y-6 fade-in">
                    <h3 className="text-2xl font-bold text-white">إدارة الرسائل</h3>
                    <div className="space-y-4">{messageTemplates.map(t => (
                        <div key={t.id} className="glass-card rounded-2xl p-5">
                            <div className="flex items-center justify-between mb-3"><h4 className="text-white font-bold">{t.category}</h4><button onClick={() => { navigator.clipboard.writeText(t.template); alert('تم النسخ!'); }} className="px-3 py-1.5 bg-brand-500/20 text-brand-400 rounded-lg text-xs">نسخ</button></div>
                            <div className="bg-dark-800 rounded-xl p-4"><p className="text-dark-200 text-sm whitespace-pre-line">{t.template}</p></div>
                        </div>
                    ))}</div>
                </div>
            );
        }

        function AnalyticsPage() {
            const platformStats = [
                { name: 'إنستغرام', followers: '12,345', engagement: '5.2%', color: 'from-pink-500 to-purple-500' },
                { name: 'تيك توك', followers: '8,234', engagement: '7.8%', color: 'from-dark-700 to-dark-900' },
                { name: 'فيسبوك', followers: '3,456', engagement: '3.1%', color: 'from-blue-500 to-blue-700' },
            ];
            return (
                <div className="space-y-6 fade-in">
                    <h3 className="text-2xl font-bold text-white">تحليل الأداء</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">{platformStats.map((p,i) => (
                        <div key={i} className="glass-card rounded-xl p-5 hover-lift">
                            <div className={`w-12 h-12 rounded-xl bg-gradient-to-br ${p.color} flex items-center justify-center text-white font-bold mb-3`}>{p.name.charAt(0)}</div>
                            <h4 className="text-white font-bold">{p.name}</h4>
                            <p className="text-dark-400 text-sm mt-2">المتابعون: <span className="text-white">{p.followers}</span></p>
                            <p className="text-dark-400 text-sm">التفاعل: <span className="text-emerald-400">{p.engagement}</span></p>
                        </div>
                    ))}</div>
                    <div className="glass-card rounded-2xl p-6"><h3 className="text-lg font-bold text-white mb-4">أفضل أوقات النشر</h3>
                        {[{t:'7 صباحاً',s:65},{t:'12 ظهراً',s:80},{t:'5 مساءً',s:90},{t:'8 مساءً',s:95}].map((item,i) => (
                            <div key={i} className="flex items-center gap-4 mb-3"><span className="text-dark-300 text-sm w-20">{item.t}</span><div className="flex-1 h-6 bg-dark-800 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-l from-brand-500 to-brand-400 rounded-full flex items-center justify-end pr-3" style={{width:`${item.s}%`}}><span className="text-white text-xs">{item.s}%</span></div></div></div>
                        ))}
                    </div>
                </div>
            );
        }

        function SettingsPage() {
            const { user } = useAuth();
            return (
                <div className="space-y-6 fade-in">
                    <h3 className="text-2xl font-bold text-white">الإعدادات</h3>
                    <div className="glass-card rounded-2xl p-6 space-y-4">
                        <h4 className="text-lg font-bold text-white">الملف الشخصي</h4>
                        <div><label className="block text-dark-300 text-sm mb-2">الاسم</label><input type="text" defaultValue={user?.displayName || ''} className="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500" /></div>
                        <div><label className="block text-dark-300 text-sm mb-2">البريد الإلكتروني</label><input type="email" defaultValue={user?.email || ''} disabled className="w-full bg-dark-800/50 border border-dark-600 rounded-xl px-4 py-3 text-dark-400" /></div>
                        <button className="px-6 py-3 bg-brand-500 hover:bg-brand-600 rounded-xl text-white font-medium transition-colors">حفظ التغييرات</button>
                    </div>
                    <div className="glass-card rounded-2xl p-6">
                        <h4 className="text-lg font-bold text-white mb-4">الاشتراك</h4>
                        <div className="flex items-center gap-4 p-4 bg-dark-800 rounded-xl"><div className="w-12 h-12 rounded-xl bg-brand-500/20 flex items-center justify-center text-brand-400 text-xl">⭐</div><div className="flex-1"><p className="text-white font-bold">الخطة المجانية</p><p className="text-dark-400 text-sm">3 منشورات شهريًا</p></div><button className="px-4 py-2 bg-brand-500 rounded-xl text-white text-sm">ترقية</button></div>
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const [currentPage, setCurrentPage] = useState('landing');

            const navigate = (page) => { setCurrentPage(page); window.scrollTo(0, 0); };

            const renderPage = () => {
                switch (currentPage) {
                    case 'landing': return <LandingPage onNavigate={navigate} />;
                    case 'login': return <LoginPage onNavigate={navigate} />;
                    case 'register': return <RegisterPage onNavigate={navigate} />;
                    case 'dashboard': return <DashboardApp onNavigate={navigate} />;
                    default: return <LandingPage onNavigate={navigate} />;
                }
            };

            return <div>{renderPage()}</div>;
        }

        function DashboardApp({ onNavigate }) {
            const [activePage, setActivePage] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            
            const pages = { dashboard: DashboardPage, calendar: CalendarPage, templates: TemplatesPage, captions: CaptionsPage, hashtags: HashtagsPage, messages: MessagesPage, analytics: AnalyticsPage, settings: SettingsPage };
            const Page = pages[activePage] || DashboardPage;

            return (
                <div className="flex min-h-screen bg-dark-950">
                    <Sidebar activePage={activePage} setActivePage={setActivePage} isOpen={sidebarOpen} setIsOpen={setSidebarOpen} />
                    <main className={`flex-1 transition-all duration-300 ${sidebarOpen ? 'mr-64' : 'mr-20'}`}>
                        <Header activePage={activePage} onNavigate={onNavigate} />
                        <div className="p-6"><Page /></div>
                    </main>
                </div>
            );
        }

        function Root() {
            return (
                <AuthProvider>
                    <App />
                </AuthProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
